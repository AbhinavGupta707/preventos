meta:
  pack: alcohol
  file: social-survival
  status: DRAFT
  version: 0.1.0
  signoff: null
  notes: >
    Social-event survival plans: built BEFORE the event, rehearsed lines the
    user picks and edits so the words are theirs. Three tools: spacing,
    alternation, exit. Never imply the user must justify not drinking.

atoms:
  # ---- Plan builder ---------------------------------------------------------
  - id: steady.social.builder.intro
    kind: script
    surface: social.plan-builder
    audience: all
    contraindications: [dependence-flagged]
    body: >
      Got something coming up — {{event_label}}? Events go better with a plan
      made sober than promises made at the bar. Three quick choices and you're
      done: your pace, your drink order, your exit.

  - id: steady.social.builder.set-cap
    kind: script
    surface: social.plan-builder
    audience: all
    contraindications: [dependence-flagged]
    body: >
      What's your number for the night? Pick it now, while it's easy.
      You can also set a "home by" time — past-you is a better negotiator
      than 11pm-you.

  - id: steady.social.builder.saved
    kind: microcopy
    surface: social.plan-builder
    audience: all
    contraindications: [dependence-flagged]
    body: >
      Plan saved. We'll send it back to you an hour before {{event_label}} —
      short enough to read at the bus stop.

  # ---- Spacing --------------------------------------------------------------
  - id: steady.social.spacing.plan
    kind: plan
    surface: social.spacing
    audience: all
    contraindications: [dependence-flagged]
    steps:
      - "First drink: take your time — the first one sets the night's pace."
      - "One alcoholic drink per {{spacing_interval}} minutes, max. Set a quiet timer if it helps."
      - "Between rounds: water, soft drink, or just an empty hand — holding a glass is optional."
      - "Eat before or during. Pace falls apart on an empty stomach."
      - "If a round lands in front of you early, it can sit there. A full glass is not a deadline."

  - id: steady.social.spacing.rounds-script
    kind: script
    surface: social.spacing
    audience: all
    contraindications: [dependence-flagged]
    body: >
      Rounds culture is the pace-killer. Lines that work: "I'm good, I'll get
      my own" · "Get me a {{soft_drink_choice}} this round" · "I'm on a slow
      one tonight". Say it once, early — nobody asks twice.

  # ---- Alternation -----------------------------------------------------------
  - id: steady.social.alternation.plan
    kind: plan
    surface: social.alternation
    audience: all
    contraindications: [dependence-flagged]
    steps:
      - "Alternate: one alcoholic drink, then one without. All night."
      - "Pick your alternate NOW: {{soft_drink_choice}}. Deciding at the bar is where it slips."
      - "Order the soft one in the same glass style — lime and soda looks like a G&T; nobody's checking."
      - "Halves, bottles, or lower-ABV swaps count as wins too — alternation isn't all-or-nothing."

  - id: steady.social.alternation.ordering-script
    kind: script
    surface: social.alternation
    audience: all
    contraindications: [dependence-flagged]
    body: >
      At the bar, the shortest sentence wins: "Pint of lime and soda, cheers."
      No preamble, no explanation. If anyone comments: "Pacing myself — long
      week" or just "Driving later, maybe." You don't owe anyone the full story.

  # ---- Refusal lines (user picks + edits their own) ---------------------------
  - id: steady.social.refusal.menu
    kind: script
    surface: social.refusal
    audience: all
    contraindications: [dependence-flagged]
    body: |
      Pick the ones that sound like you — edit them until they do:
      "Not tonight, early start."
      "I'm driving."
      "On antibiotics, boring story."
      "Taking a few weeks off it — feel loads better."
      "I'm good with this one." (raise whatever's in your hand)
      A reason said relaxed beats a speech said tense. One line, then change the subject.

  - id: steady.social.refusal.persistent-pusher
    kind: script
    surface: social.refusal
    audience: all
    contraindications: [dependence-flagged]
    body: >
      If someone keeps pushing after two nos, that's about them, not you.
      "Mate, I said I'm good" with a grin ends it 9 times in 10. The tenth
      time — that's your cue for the exit plan, and it tells you something
      useful about who makes the next round of plans.

  # ---- Exit plans --------------------------------------------------------------
  - id: steady.social.exit.plan
    kind: plan
    surface: social.exit
    audience: all
    contraindications: [dependence-flagged]
    steps:
      - "Decide your leave time before you arrive. Tell one person you trust: \"I'm off at {{exit_time}}.\""
      - "Know your route home before the first drink: last train time, bus, taxi number saved."
      - "Pre-load an out: an alarm labelled as a call, a real commitment tomorrow, the dog."
      - "Leave on a high point, not when you're the last one negotiating with the night."
      - "Exit line: \"Right, I'm out — this was great.\" Warm, short, already standing."

  - id: steady.social.exit.escape-hatch
    kind: script
    surface: social.exit
    audience: all
    contraindications: [dependence-flagged]
    body: >
      The 60-second exit, when the night is tipping: phone out, "that's my
      cue", coat, door. You can text apologies tomorrow from a clear head.
      Anyone worth their salt will have forgotten by next week; you'll
      remember tomorrow morning all month.

  # ---- Post-event debrief --------------------------------------------------------
  - id: steady.social.debrief.went-well
    kind: microcopy
    surface: social.debrief
    audience: all
    contraindications: [dependence-flagged]
    body: >
      {{event_label}} — done, and the plan held. Which part did the heavy
      lifting: the pacing, the alternates, or the exit time? We'll front-load
      that next time.

  - id: steady.social.debrief.went-over
    kind: microcopy
    surface: social.debrief
    audience: all
    contraindications: [dependence-flagged]
    body: >
      {{event_label}} went past the plan — it happens, and the plan isn't
      wasted: it's data. Where did it bend — the rounds, the timing, a
      particular moment? Thirty seconds now makes the next plan smarter.
