meta:
  pack: alcohol
  programme: Steady
  module: lapse-debriefs
  status: draft
  schema: preventos.content-atom/0.1
  version: "0.1.0"
  language: en-GB
  defaults:
    vertical: alcohol
    reading_age: 9
    tone: autonomy-supportive
    channels: [app, web]
    contraindications: [dependence-flagged]
  # Lapse debriefs tuned for the abstinence-violation effect (AVE): the danger
  # after a lapse isn't the units drunk, it's the "I've blown it, what's the
  # point" spiral that turns one heavy night into a written-off month. Every
  # debrief: (1) normalise without trivialising, (2) kill the all-or-nothing
  # frame, (3) extract one piece of usable information, (4) repair the plan,
  # (5) shrink the timeline back to today. Banned words: failed, ruined,
  # blown it, wasted, back to square one, willpower.

atoms:
  # ---- Immediate post-lapse (first screen after a heavy log)
  - id: alcohol.lapse.immediate.open
    type: exercise
    body: >
      Last night went past the plan. Before anything else: logging it was the
      strong move — most people's instinct is to hide the evidence, including
      from themselves.
    bcttv1: [{ code: "11.2", label: "Reduce negative emotions" }]
    com_b: [reflective-motivation]

  - id: alcohol.lapse.immediate.ave-defuse
    type: exercise
    body: >
      Here's the trap to dodge today: the voice that says "well, that's the
      week ruined, may as well carry on." That voice turns one night into
      seven. The maths says otherwise — one heavy night in a better month is
      still a better month. Nothing you built is undone.
    bcttv1: [{ code: "13.2", label: "Framing/reappraisal" }]
    com_b: [reflective-motivation]

  - id: alcohol.lapse.immediate.choice
    type: exercise
    body: |
      What would help right now?
      · Two-minute debrief — work out what happened
      · Just repair the plan and move on
      · Neither, today — come back to it later (it'll be here)
    steps:
      - "Two-minute debrief — work out what happened"
      - "Just repair the plan and move on"
      - "Neither, today — come back to it later (it'll be here)"
    bcttv1: [{ code: "1.1", label: "Goal setting (behaviour)" }]
    com_b: [reflective-motivation]

  # ---- Functional-analysis debrief (the two-minute version)
  - id: alcohol.lapse.debrief.walkthrough
    type: exercise
    body: |
      No blame in any of these — just mechanics:
      · Where were you, and who with?
      · What was the feeling just before the first drink — stress, boredom, relief, celebration, autopilot?
      · Was there a moment it tipped — a round, a top-up, a "go on then"?
      · What would have had to be different for the night to go to plan?
    steps:
      - "Where were you, and who with?"
      - "What was the feeling just before the first drink — stress, boredom, relief, celebration, autopilot?"
      - "Was there a moment it tipped — a round, a top-up, a \"go on then\"?"
      - "What would have had to be different for the night to go to plan?"
    bcttv1: [{ code: "1.2", label: "Problem solving" }]
    com_b: [psychological-capability]

  - id: alcohol.lapse.debrief.pattern-link
    type: exercise
    body: >
      That's the third debrief that mentions {{recurring_trigger}}. Patterns
      like that aren't character flaws — they're design problems, and design
      problems have design fixes. Want to build a plan specifically for
      {{recurring_trigger}}?
    slots: [recurring_trigger]
    bcttv1: [{ code: "1.1", label: "Goal setting (behaviour)" }]
    com_b: [reflective-motivation]

  - id: alcohol.lapse.debrief.close
    type: exercise
    body: >
      Filed. One honest debrief is worth more than a week of feeling bad —
      feeling bad isn't a strategy, but "{{extracted_insight}}" is something
      we can actually build around.
    slots: [extracted_insight]
    bcttv1: [{ code: "2.3", label: "Self-monitoring of behaviour" }]
    com_b: [psychological-capability]

  # ---- Plan repair
  - id: alcohol.lapse.repair.offer
    type: exercise
    body: >
      Your goal ({{goal_label}}) doesn't reset — it continues from today.
      Want to keep it as is, or adjust it? Adjusting after new information
      is called learning, not lowering the bar.
    slots: [goal_label]
    bcttv1: [{ code: "1.1", label: "Goal setting (behaviour)" }]
    com_b: [reflective-motivation]

  - id: alcohol.lapse.repair.today-sized
    type: exercise
    body: >
      Forget the week for a second. Today is the whole assignment: how do you
      want today to go? Tomorrow can have its own meeting.
    bcttv1: [{ code: "1.1", label: "Goal setting (behaviour)" }]
    com_b: [reflective-motivation]

  # ---- Repeat-lapse compassion ladder (escalating warmth, never judgement)
  - id: alcohol.lapse.repeat.second
    type: exercise
    body: >
      Two big nights this week. Still not a verdict — but worth saying plainly:
      the plan as written isn't matching your actual week. That's a plan
      problem. Let's make the plan fit the life, not pretend the life will
      fit the plan.
    bcttv1: [{ code: "1.1", label: "Goal setting (behaviour)" }]
    com_b: [reflective-motivation]

  - id: alcohol.lapse.repeat.third
    type: exercise
    body: >
      This stretch has been heavy going, and you've kept logging through it —
      that takes more honesty than a good week does. Two thoughts: smaller
      goals win streaks, and talking it through helps more than toughing it
      out. The coach is here; so is a do-over on the plan. Pick either.
    bcttv1: [{ code: "3.1", label: "Social support (unspecified)" }]
    com_b: [social-opportunity]

  - id: alcohol.lapse.repeat.persistent-note
    type: exercise
    body: >
      If the last few weeks have felt less like choosing to drink and more
      like not being able to choose — that's worth a proper conversation with
      someone qualified, and it's a sign of the problem's size, not yours.
      We can show you free, confidential options whenever you want them.
    evidence_note: >
      Persistent heavy pattern should also re-trigger the deterministic dependence
      screen (WP10.3 criteria) — this copy is a soft signpost, never the safety
      mechanism itself.
    bcttv1: [{ code: "5.1", label: "Information on consequences" }]
    com_b: [reflective-motivation]

  # ---- Craving rescue (urge surfing + delay + call-someone)
  - id: alcohol.lapse.rescue.urge-surf
    type: message
    body: >
      Cravings crest and fall like a wave — usually inside 20 minutes, always
      eventually. You don't have to beat it, just outlast it. Notice where it
      sits in your body. Breathe slower than feels natural. You've outlasted
      every craving you've ever had; that's why you're here to read this.
    bcttv1: [{ code: "4.1", label: "Instruction on how to perform the behaviour" }]
    com_b: [psychological-capability]

  - id: alcohol.lapse.rescue.delay
    type: message
    body: >
      The 15-minute deal: not "no", just "not yet". Kettle on, shower, walk
      to the corner, one episode of anything. If you still want the drink in
      15 minutes, that's a decision you're allowed to make — but most waves
      don't survive the kettle.
    bcttv1: [{ code: "1.2", label: "Problem solving" }]
    com_b: [psychological-capability]

  - id: alcohol.lapse.rescue.call-someone
    type: message
    body: >
      Cravings hate witnesses. Text or call {{support_contact_name}} — you
      don't have to mention the craving; the conversation itself does the
      work. No one to hand? Drinkline is free and confidential:
      0300 123 1110 (weekdays 9am–8pm, weekends 11am–4pm).
    slots: [support_contact_name]
    bcttv1: [{ code: "3.1", label: "Social support (unspecified)" }]
    com_b: [social-opportunity]
