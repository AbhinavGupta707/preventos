meta:
  pack: sleep
  programme: Nightshift
  module: safety-screens
  status: draft
  schema: preventos.content-atom/0.1
  defaults:
    vertical: sleep
    reading_age: 9
    tone: autonomy-supportive
    channels:
    - app
    - web
    contraindications: []
atoms:
- id: sleep.safety.screen-intro
  type: screen_script
  title: Why we ask about your work
  bcttv1:
  - code: '4.1'
    label: Instruction on how to perform a behaviour
  com_b:
  - psychological-capability
  reading_age: 9
  channels:
  - app
  tone: autonomy-supportive
  contraindications: []
  body: 'Quick one before we shape your plan: a couple of questions about

    your work and your days.


    Here''s why. Parts of this programme gently reshape when and how long

    you sleep, and that can mean feeling sleepier than usual for a few

    weeks while things settle. For most people that''s just a yawny

    patch. But if staying sharp is a safety matter in your day — driving

    for work, operating machinery, that kind of thing — we set your plan

    up more gently from the start.


    Honest answers get you the right version. There''s no wrong answer

    and nothing to fail.

    '
- id: sleep.safety.occupation-screen
  type: screen_script
  title: Occupation screen (bespoke routing questions)
  bcttv1:
  - code: '4.1'
    label: Instruction on how to perform a behaviour
  com_b:
  - psychological-capability
  reading_age: 9
  channels:
  - app
  tone: practical
  contraindications: []
  questions:
  - key: q1
    prompt: 'Does your work regularly involve any of these? Tick all that apply.

      '
    options:
    - id: driving-professional
      label: Driving as the job — lorry, bus, coach, taxi, delivery
      flag: true
    - id: driving-long-commute
      label: Long daily drives (over an hour each way)
      flag: true
    - id: machinery
      label: Operating heavy machinery, plant or power tools
      flag: true
    - id: heights-rail-marine-air
      label: Working at height, or in rail, marine or aviation roles
      flag: true
    - id: safety-of-others
      label: Others' safety directly in my hands (e.g. care of vulnerable people, emergency response, security)
      flag: true
    - id: none
      label: None of these
  - key: q2
    prompt: 'Outside work — do you regularly drive, or are you the main carer

      for someone who depends on you through the day or night?

      '
    options:
    - id: yes-driving-or-caring
      label: 'Yes'
      flag: true
    - id: 'false'
      label: 'No'
- id: sleep.safety.sleepiness-screen
  type: screen_script
  title: Daytime sleepiness check (bespoke routing questions)
  bcttv1:
  - code: '2.4'
    label: Self-monitoring of outcomes of behaviour
  - code: '4.1'
    label: Instruction on how to perform a behaviour
  com_b:
  - psychological-capability
  reading_age: 9
  channels:
  - app
  tone: practical
  contraindications: []
  questions:
  - key: q1
    prompt: 'In the last month, have you found yourself fighting to stay awake

      — or actually nodding off — at times when you needed to be alert?

      For example while driving, at the wheel waiting in traffic, or

      operating anything that could hurt you or someone else.

      '
    options:
    - id: never
      label: No, that hasn't happened
    - id: once-or-twice
      label: Once or twice
    - id: regularly
      label: Yes, it keeps happening
- id: sleep.safety.floor-explainer
  type: message
  title: Why your plan is the gentler version
  bcttv1:
  - code: '4.1'
    label: Instruction on how to perform a behaviour
  - code: '13.2'
    label: Framing/reframing
  com_b:
  - psychological-capability
  - reflective-motivation
  reading_age: 9
  channels:
  - app
  tone: autonomy-supportive
  contraindications: []
  body: 'Based on what you''ve told us about your days, we''ve set you up with

    the gentler version of the sleep plan.


    What that means in practice: your sleep window — the regular sleep

    slot we''ll help you settle into — never goes below a protected

    minimum, and we move it in smaller steps. You still get the full

    programme: the habits, the wind-downs, the thought tools, the diary.

    We just never push the sleepiness dial hard, because your days need

    you alert.


    This isn''t a lesser version — it''s the right version for someone

    whose alertness carries weight. It tends to take a little longer

    and lands in the same place.


    If your work or driving situation changes, tell us in settings and

    we''ll adjust.

    '
- id: sleep.safety.sleepiness-signpost
  type: message
  title: When sleepiness needs more than an app
  bcttv1:
  - code: '3.1'
    label: Social support (unspecified)
  com_b:
  - psychological-capability
  reading_age: 9
  channels:
  - app
  tone: autonomy-supportive
  contraindications: []
  body: "You've told us you've been fighting sleep at moments where alertness\nreally matters. Thank you for being straight about it — that takes\nhonesty, and it changes what good support looks like.\n\nTwo things we'd genuinely encourage:\n\n• Book a chat with your GP about the daytime sleepiness specifically.\n  Strong sleepiness in safety-moments is worth a professional pair of\n  eyes, separate from anything we do here. If it helps, the app can\n  show you a summary of your recent sleep diary to bring along.\n• Until it's settled: please don't push through heavy eyes at the\n  wheel or at the controls of anything. Pull over, take the\n  20-minute nap, ask someone else to drive. Late beats every\n  alternative.\n\nYour programme here continues as normal — on the gentler plan, with\nevery tool still available. This is backup, not a handover.\n"
- id: sleep.safety.occupation-change
  type: message
  title: (Settings) Work or driving changed?
  bcttv1:
  - code: '7.1'
    label: Prompts/cues
  com_b:
  - psychological-capability
  reading_age: 9
  channels:
  - app
  tone: practical
  contraindications: []
  body: 'New job, new commute, new caring responsibilities? Anything that

    changes how alert your days need you to be is worth re-checking —

    it takes under a minute and keeps your plan tuned to your real life.

    '
