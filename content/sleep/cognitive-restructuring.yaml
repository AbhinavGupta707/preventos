atoms:
- id: sleep.cr.intro
  type: message
  title: Thoughts about sleep change sleep
  bcttv1:
  - code: '13.2'
    label: Framing/reframing
  - code: '4.1'
    label: Instruction on how to perform a behaviour
  com_b:
  - psychological-capability
  reading_age: 9
  channels:
  - app
  tone: autonomy-supportive
  contraindications: []
  body: 'What you believe about sleep shows up in your body. "Tonight has to go

    well or tomorrow is ruined" raises the stakes — and raised stakes mean

    alertness, the exact opposite of what helps.


    In this section we''ll take the most common night-time thoughts, hold

    them up to the light, and find versions that are more accurate — and

    easier to fall asleep next to.


    This isn''t positive thinking. It''s accurate thinking. The honest version

    of most sleep worries turns out to be far less scary than the 2am version.

    '
- id: sleep.cr.eight-hours-rule
  type: exercise
  title: 'Thought-checker: ''I need 8 hours or tomorrow is ruined'''
  bcttv1:
  - code: '13.2'
    label: Framing/reframing
  com_b:
  - psychological-capability
  - reflective-motivation
  reading_age: 9
  channels:
  - app
  tone: autonomy-supportive
  contraindications: []
  body: "The thought: \"I need 8 hours, or tomorrow is ruined.\"\n\nCheck it:\n• Have you ever had a decent day on less? (Almost everyone has — new\n  parents and night-before-a-flight travellers do it constantly.)\n• Is \"8 hours\" your number, or just a number you've heard? People's\n  real needs range widely, and they shift with age and season.\n• What actually ruined past bad-sleep days — the missing hours, or the\n  dread about the missing hours?\n\nA steadier version: \"More sleep is nice, but I've run on less plenty of\ntimes. Tomorrow will be okay either way — and believing that makes\ntonight easier too.\"\n"
- id: sleep.cr.wont-cope
  type: exercise
  title: 'Thought-checker: ''I won''t cope tomorrow'''
  bcttv1:
  - code: '13.2'
    label: Framing/reframing
  - code: '15.1'
    label: Verbal persuasion about capability
  com_b:
  - psychological-capability
  - reflective-motivation
  reading_age: 9
  channels:
  - app
  - audio
  tone: autonomy-supportive
  contraindications: []
  body: "The thought: \"If I don't sleep, I won't cope tomorrow.\"\n\nCheck it:\n• Think of your last genuinely rough night. What actually happened the\n  next day? Probably tired, a bit flat — and yet things got done.\n• You're predicting collapse, but your track record shows endurance.\n  Which is the better evidence?\n\nA steadier version: \"Tomorrow might be tiring, not impossible. I've done\ntired days before. I can lower the bar a little and get through —\nand tired days end in sleepy nights.\"\n"
- id: sleep.cr.broken-sleeper-identity
  type: exercise
  title: 'Thought-checker: ''I''m just a bad sleeper'''
  bcttv1:
  - code: '13.2'
    label: Framing/reframing
  - code: '13.4'
    label: 'Unknown: 13.4'
  com_b:
  - reflective-motivation
  reading_age: 9
  channels:
  - app
  tone: warm-challenge
  contraindications: []
  body: "The thought: \"I'm just a bad sleeper. Always have been.\"\n\nCheck it:\n• Always? Every single night of your life? Or are there exceptions —\n  holidays, certain sofas, nights you'd given up caring?\n• The exceptions matter. They show your sleep system still works; it's\n  the conditions and habits around it that have drifted.\n• \"Bad sleeper\" is an identity. Identities feel permanent. Habits don't —\n  and what we're changing here is habits.\n\nA steadier version: \"I'm someone whose sleep has been off track lately.\nPatterns got me here, and patterns are exactly the thing I can change.\"\n"
- id: sleep.cr.trying-harder
  type: exercise
  title: 'Thought-checker: ''I just need to try harder to sleep'''
  bcttv1:
  - code: '13.2'
    label: Framing/reframing
  - code: '4.1'
    label: Instruction on how to perform a behaviour
  com_b:
  - psychological-capability
  reading_age: 9
  channels:
  - app
  - audio
  tone: autonomy-supportive
  contraindications: []
  body: 'The thought: "I need to try harder to fall asleep."


    Here''s the trap: sleep is the one goal that runs away when you chase

    it. Trying is effort, effort is arousal, and arousal is wakefulness.

    You can''t force sleep for the same reason you can''t force hunger.


    What you can do is set the table — wind down, dim light, bed when

    sleepy — and let your body take it from there.


    A steadier version: "My job is the conditions, not the result. I''ll do

    my wind-down and let sleep arrive on its own schedule. It always does,

    eventually — that part isn''t up to me."

    '
- id: sleep.cr.right-now-spiral
  type: exercise
  title: 'Thought-checker: ''If I don''t fall asleep RIGHT NOW…'''
  bcttv1:
  - code: '13.2'
    label: Framing/reframing
  - code: '11.2'
    label: Reduce negative emotions
  com_b:
  - psychological-capability
  - automatic-motivation
  reading_age: 9
  channels:
  - app
  - audio
  tone: autonomy-supportive
  contraindications: []
  body: "The thought: \"If I don't fall asleep right now, that's only five hours…\nnow four and a half…\"\n\nNotice what this is: doing maths against a deadline. Nobody relaxes\nduring a countdown.\n\nCheck it:\n• Has the countdown ever once helped you fall asleep faster?\n• The numbers feel precise, but they're guesses stacked on guesses —\n  you don't actually know when you'll drop off or how the night will go.\n\nA steadier version: \"The maths never helps. Whatever sleep I get from\nhere is a bonus, and resting quietly counts for something too. I'm\nputting the calculator down.\"\n"
- id: sleep.cr.one-bad-night
  type: message
  title: One rough night is one rough night
  bcttv1:
  - code: '13.2'
    label: Framing/reframing
  - code: '11.2'
    label: Reduce negative emotions
  com_b:
  - reflective-motivation
  reading_age: 9
  channels:
  - app
  - push
  tone: autonomy-supportive
  contraindications: []
  body: 'A rough night feels like it should "count" against you — like the streak

    is broken and the project has failed.


    It hasn''t. Sleep patterns are built over weeks, not single nights.

    Everyone, including naturally great sleepers, has scattered bad nights;

    they just don''t read them as verdicts.


    The only move that matters after a bad night: get up at your usual time

    and carry on. The pattern is the prize, and the pattern is still intact.

    '
- id: sleep.cr.constructive-worry
  type: exercise
  title: Park the worry before it goes to bed with you
  bcttv1:
  - code: '1.2'
    label: Problem solving
  - code: '1.4'
    label: Action planning
  - code: '11.2'
    label: Reduce negative emotions
  com_b:
  - psychological-capability
  reading_age: 9
  channels:
  - app
  tone: practical
  contraindications: []
  body: 'Night-time is when worries queue up — because it''s the first quiet

    moment your brain has had all day to raise them.


    Give them an earlier slot instead. Sometime in the early evening, take

    ten minutes with paper:


    1. Write down what''s on your mind — everything, big or small.

    2. For each one, jot the single next step (even "ask Sam on Monday").

    3. Fold the paper. The list now exists outside your head.


    If a worry shows up at 2am anyway: "It''s on the list. It has a slot.

    Not now." It takes practice, but the list makes it true.

    '
- id: sleep.cr.night-thought-check
  type: exercise
  title: The 2am thought check (short form)
  bcttv1:
  - code: '13.2'
    label: Framing/reframing
  - code: '11.2'
    label: Reduce negative emotions
  com_b:
  - psychological-capability
  reading_age: 9
  channels:
  - audio
  - app
  tone: autonomy-supportive
  contraindications: []
  body: "Caught in a 2am thought? Three quick questions, no pen needed:\n\n1. Is this thought a fact, or a 2am forecast? (2am forecasts are\n   famously grim and famously wrong.)\n2. Will this look this big at 10am tomorrow?\n3. Is there anything I can usefully do about it right now, in the dark?\n\nThe answer to the third one is almost always no — which is oddly\nfreeing. Nothing is being asked of you until morning. The only job left\ntonight is to rest, and rest doesn't require solving anything.\n"
