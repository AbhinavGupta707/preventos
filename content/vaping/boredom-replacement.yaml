meta:
  pack: vaping
  programme: Exhale
  module: boredom-replacement
  status: draft
  schema: preventos.content-atom/0.1
  version: "0.1.0"
  language: en-GB
  defaults:
    vertical: vaping
    reading_age: 9
    tone: autonomy-supportive
    channels: [app, web]
    contraindications: []

atoms:
  - id: vaping.boredom.desk-working
    type: menu
    title: "Desk / working"
    items:
      - copy: "Fidget object in the vape pocket — same reach, different object. Put it where the vape lived."
        fills: hands
      - copy: "Two-minute tidy: clear five things off the desk. Restless energy, spent."
        fills: hands
      - copy: "Cold water or sparkling water within arm's reach. Refill = your new micro-break."
        fills: mouth
      - copy: "Sugar-free gum or a mint — keep them where the vape used to sit."
        fills: mouth
      - copy: "The vape break was really a screen break. Take the break without the vape: window, stretch, 10 deep breaths."
        fills: mind
    tone: practical
    bcttv1:
      - code: "8.2"
        label: "Behaviour substitution"
    com_b:
      - physical-opportunity

  - id: vaping.boredom.commute-travelling
    type: menu
    title: "Commute / travelling"
    items:
      - copy: "Queue a podcast or playlist that only plays on the commute — give the journey its own reward."
        fills: mind
      - copy: "Phone game or puzzle app for exactly the stretch where you used to vape."
        fills: hands
      - copy: "Travel pack of gum in the same pocket the vape used."
        fills: mouth
      - copy: "Get off one stop early when you can. The walk does what the vape pretended to do — clears your head, for free."
        fills: mind
    tone: autonomy-supportive
    bcttv1:
      - code: "8.2"
        label: "Behaviour substitution"
    com_b:
      - physical-opportunity

  - id: vaping.boredom.gaming-watching-tv
    type: menu
    title: "Gaming / watching TV"
    items:
      - copy: "Controller in both hands is already a vape blocker. The risk window is the lobby/loading screen — keep a drink there instead."
        fills: hands
      - copy: "Bottle of something cold on the side table before you sit down. Decide once, not every craving."
        fills: mouth
      - copy: "Between episodes: 60 seconds of anything physical — stretch, press-ups, kettle on. Breaks the auto-reach."
        fills: hands
      - copy: "Notice the pattern: pause = puff was a rule you never chose. Write a new one: pause = sip."
        fills: mind
    tone: autonomy-supportive
    bcttv1:
      - code: "8.2"
        label: "Behaviour substitution"
    com_b:
      - physical-opportunity

  - id: vaping.boredom.queueing-waiting
    type: menu
    title: "Queueing / waiting around"
    items:
      - copy: "This is the rawest boredom there is — and it's also the shortest. Most waits end within minutes; the craving's on the same timer."
        fills: mind
      - copy: "Phone is fine here. Open the app, log the craving, watch it count as a win."
        fills: hands
      - copy: "Mint tin in the jacket pocket. Same ritual: reach, open, done."
        fills: mouth
      - copy: "People-watch deliberately: find three things you'd never have noticed mid-puff."
        fills: mind
    tone: autonomy-supportive
    bcttv1:
      - code: "8.2"
        label: "Behaviour substitution"
    com_b:
      - physical-opportunity

  - id: vaping.boredom.social-break
    type: menu
    title: "Social smoking/vaping break (outdoors with others)"
    items:
      - copy: "Go on the break — skip the vape. The break was always the good part: air, chat, a pause. Keep all of that."
        fills: mind
      - copy: "Take a coffee or cold drink out with you. Hands and mouth occupied, nothing to explain."
        fills: mouth
      - copy: "Have your line ready: 'I'm cutting down.' Said casually, it lands casually — and most people quietly respect it."
        fills: mind
      - copy: "If holding nothing feels weird, hold the drink in your vaping hand specifically."
        fills: hands
    tone: autonomy-supportive
    bcttv1:
      - code: "8.2"
        label: "Behaviour substitution"
    com_b:
      - social-opportunity

  - id: vaping.boredom.private-break
    type: menu
    title: "Phone scroll / toilet break"
    items:
      - copy: "The scroll-and-puff pair is one habit wearing two coats. Break either half and the other loosens: leave the vape outside the door once today."
        fills: mind
      - copy: "If this break is really an escape hatch from something (a person, a task, a feeling) — that's worth knowing. Two questions in the app will tell you."
        fills: mind
      - copy: "Water bottle goes where the vape went. Same pocket, same reach."
        fills: mouth
    tone: autonomy-supportive
    bcttv1:
      - code: "1.2"
        label: "Problem solving"
    com_b:
      - physical-opportunity

  - id: vaping.boredom.evening-winddown
    type: menu
    title: "Evening wind-down"
    items:
      - copy: "Evening puffs cost you twice: tonight's sleep and tomorrow's dependence. Push your last vape earlier and both improve."
        fills: mind
      - copy: "Herbal tea or decaf ritual at the time you'd usually start evening vaping. New anchor, same comfort."
        fills: mouth
      - copy: "Hands busy, mind quiet: shower, skincare, stretching, tidying tomorrow's stuff. The skincare one pays you back in the mirror."
        fills: hands
      - copy: "Charge the vape outside the bedroom. Distance is the cheapest willpower there is."
        fills: mind
    tone: practical
    bcttv1:
      - code: "12.1"
        label: "Restructuring the physical environment"
    com_b:
      - physical-opportunity

  - id: vaping.boredom.why-boredom-is-real-opponent
    type: info_card
    title: "Why boredom is the real opponent"
    body: |
      Most vaping isn't about strong cravings — it's about small empty
      moments. The device became your default for every gap in the day:
      loading screens, kettle boiling, lift lobbies.

      That's actually encouraging. You don't need heroic willpower; you need
      better defaults for ten small moments. We'll set them up one context at
      a time, starting with wherever you vape most.
    slots:
      - top_context
    tone: autonomy-supportive
    bcttv1:
      - code: "8.2"
        label: "Behaviour substitution"
    com_b:
      - psychological-capability
