meta:
  pack: vaping
  programme: Exhale
  module: stealth-use-analysis
  status: draft
  schema: preventos.content-atom/0.1
  version: "0.1.0"
  language: en-GB
  defaults:
    vertical: vaping
    reading_age: 9
    tone: autonomy-supportive
    channels: [app, web]
    contraindications: []

atoms:
  - id: vaping.stealth.functional-analysis
    type: screen_script
    title: "Stealth-use functional analysis"
    questions:
      - key: intro
        prompt: |
          No judgement here — the hidden vapes are usually the most
          interesting ones. They're rarely about nicotine alone; they're
          doing a job. Two minutes of honest answers and we'll find out
          what job, and what else could do it.
        options:
          - id: got-it
            label: "Got it, let's dig in"
      - key: q_where
        prompt: "Where does it usually happen?"
        options:
          - id: toilet-break
            label: "toilet break"
          - id: car-before-in
            label: "car before going in"
          - id: stepping-outside
            label: "stepping outside"
          - id: stairwell
            label: "stairwell or corridor"
          - id: fetching-something
            label: "while 'fetching something'"
          - id: other-where
            label: "other"
      - key: q_before
        prompt: "What's usually happening right before? (pick the closest)"
        options:
          - id: task-avoiding
            label: "a task I'm avoiding"
          - id: break-from-person
            label: "a person or meeting I need a break from"
          - id: pure-boredom
            label: "pure boredom / a dead gap"
          - id: tension-building
            label: "tension or stress building up"
          - id: routine-time
            label: "it's just the routine at that time"
      - key: q_job
        prompt: "And the vape itself — what does it actually give you in that moment?"
        options:
          - id: permission-exit
            label: "permission to leave / an exit"
          - id: minutes-alone
            label: "a few minutes alone"
          - id: stimulation
            label: "a hit of stimulation"
          - id: calming
            label: "calming down"
          - id: something-do
            label: "something to do"
    tone: autonomy-supportive
    bcttv1:
      - code: "2.3"
        label: "Self-monitoring of behaviour"
    com_b:
      - reflective-motivation

  - id: vaping.stealth.exit-pass
    type: info_card
    title: "Function: the exit pass"
    body: |
      The vape became your hall pass — a socially packaged reason to leave a
      room. Notice: the leaving is what helps. The vape just launders it.

      You're an adult. "Back in five" is a complete sentence. Try taking the
      exact same break, same length, same route — without the device. Same
      relief, and nobody's ever once asked you to justify a glass of water.
    tone: autonomy-supportive
    bcttv1:
      - code: "8.2"
        label: "Behaviour substitution"
    com_b:
      - psychological-capability

  - id: vaping.stealth.minutes-alone
    type: info_card
    title: "Function: minutes alone"
    body: |
      If the hidden vape is buying you solitude, the real need is recovery
      time — especially if your day is wall-to-wall people. That need is
      valid and it deserves better than a stairwell.

      Schedule the alone time on purpose: a real walk at lunch, headphones
      for the first ten minutes after you get home, the long way round to
      the meeting. Planned solitude beats stolen solitude — it actually
      restores you, and there's nothing to hide.
    tone: autonomy-supportive
    bcttv1:
      - code: "1.4"
        label: "Action planning"
    com_b:
      - physical-opportunity

  - id: vaping.stealth.stimulation-hit
    type: info_card
    title: "Function: the stimulation hit"
    body: |
      Reaching for a hit to push through a slump? Nicotine's lift is real
      but rigged: every hit digs the next dip. You're borrowing alertness
      from yourself an hour from now.

      Off-device versions that don't charge interest: cold water on the
      face or wrists, 20 fast stair-steps, two minutes of brisk air,
      daylight if you've been inside all morning. Cheaper, faster, and your
      focus stops sawtoothing through the day.
    tone: practical
    bcttv1:
      - code: "8.2"
        label: "Behaviour substitution"
    com_b:
      - physical-opportunity

  - id: vaping.stealth.calming-down
    type: info_card
    title: "Function: calming down"
    body: |
      Here's the trick nicotine plays: a good chunk of the tension it
      "relieves" is the tension of running low on it. The calm you feel is
      mostly the alarm being switched off — an alarm only nicotine set.

      What actually downshifts your nervous system: long exhales (the
      breathing pacer does this with you — 90 seconds), dropping your
      shoulders, stepping outside. As your levels step down, the background
      tension drops with them. Most people report feeling *less* wound up
      two weeks after a step-down, not more.
    slots:
      - pacer_link
    tone: autonomy-supportive
    bcttv1:
      - code: "11.2"
        label: "Reduce negative emotions"
    com_b:
      - psychological-capability

  - id: vaping.stealth.something-to-do
    type: info_card
    title: "Function: something to do"
    body: |
      If the honest answer is "it's just something to do", you've found the
      easiest function to replace — boredom has a hundred substitutes and
      your replacement menu is built from them.

      Start with the single context where stealth puffs happen most, and
      pre-place the substitute there today: gum in the car door, water
      bottle on the desk, podcast queued for the walk.
    slots:
      - replacement_menu_link
    tone: autonomy-supportive
    bcttv1:
      - code: "8.2"
        label: "Behaviour substitution"
    com_b:
      - physical-opportunity

  - id: vaping.stealth.episode-debrief
    type: message
    title: "Stealth-episode debrief (coach copy)"
    body: |
      Logged it — and logging the hidden ones takes the most honesty, so
      credit where it's due.

      Quick read-back: that's the {episode_count}th one this week in
      {context}, and the pattern says it's mostly about {function}.
      Each one of these is information, not a verdict. Want to set up a
      swap for that exact moment, or just keep watching the pattern for now?

      Either answer is fine. You're the one steering.
    slots:
      - episode_count
      - context
      - function
    tone: autonomy-supportive
    bcttv1:
      - code: "2.3"
        label: "Self-monitoring of behaviour"
    com_b:
      - reflective-motivation
