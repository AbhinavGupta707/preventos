# Exhale — withdrawal coaching atoms (WPV.2c)
# STATUS: DRAFT — not user-deliverable without compliance/ sign-off entry.
pack: vaping
file: withdrawal-coaching
status: DRAFT
version: 0.1.0

atoms:
  - id: vap-withdraw-001
    type: coaching_card
    title: "What to expect when you cut down"
    audience: adult
    framing: [autonomy, performance]
    contraindications: []
    status: draft
    body: |
      Nicotine leaves your system fast — that's actually good news. The
      uncomfortable part is short. Most people notice the strongest pull in
      the first 3–5 days after a step down, and it fades noticeably by the
      end of week two.

      You might feel: restless, irritable, foggy, or hungrier than usual.
      None of it means something is wrong. It means your brain is recalibrating
      to run on its own — which is exactly what you asked it to do.

      Every craving you ride out makes the next one weaker. That's not a
      slogan; it's how habituation works.

  - id: vap-withdraw-002
    type: coaching_card
    title: "Cravings: the 3-minute truth"
    audience: adult
    framing: [autonomy, performance]
    contraindications: []
    status: draft
    body: |
      A craving feels permanent while it's happening. It isn't. Untouched,
      a craving peaks and passes in about 3–5 minutes — faster than most
      queues you stand in without thinking twice.

      When one hits:
      1. Name it: "this is a craving, it will pass."
      2. Move: stand up, change rooms, step outside.
      3. Occupy your hands and mouth (your replacement menu has options).

      You don't have to win an argument with the craving. You just have to
      outlast it. You always can — it has a timer and you don't.
    slots:
      replacement_menu_link: deep link into the user's boredom-replacement menu

  - id: vap-withdraw-003
    type: coaching_card
    title: "Irritability is rented, not owned"
    audience: adult
    framing: [autonomy]
    contraindications: []
    status: draft
    body: |
      Short fuse today? That's the step-down talking, not your personality.
      It's temporary chemistry, and it loosens its grip within days.

      What helps: tell the people around you ("I'm cutting down, I might be
      snappy for a few days — it's not you"). Most people respond with more
      support than you'd expect, and saying it out loud makes you more
      committed, not less.

  - id: vap-withdraw-004
    type: coaching_card
    title: "Foggy focus — and when it clears"
    audience: adult
    framing: [performance]
    contraindications: []
    status: draft
    body: |
      Concentration can dip for the first week after a step down. Your brain
      got used to nicotine punctuating your attention; it's relearning how to
      hold focus on its own.

      Work with it, not against it: shorter focus blocks (25 minutes, then a
      real break — walk, water, window), and park the hardest tasks for your
      best hours. By week two, most people report their focus is steadier
      than it was while vaping — no more attention tax every 40 minutes when
      the nicotine dipped.

  - id: vap-withdraw-005
    type: coaching_card
    title: "Sleep while stepping down"
    audience: adult
    framing: [performance]
    contraindications: []
    status: draft
    body: |
      Nicotine is a stimulant, so cutting it down usually improves sleep —
      but the first few nights can be restless while your system adjusts,
      especially if you vaped close to bedtime.

      Hold two lines for a week: nothing with caffeine after mid-afternoon,
      and keep your last vape (while you still have a budget) at least two
      hours before bed. Pushing your evening puffs earlier is one of the
      highest-value moves in the whole programme — it improves tonight AND
      lowers tomorrow's dependence.

  - id: vap-withdraw-006
    type: coaching_card
    title: "Hungrier than usual?"
    audience: adult
    framing: [appearance, performance]
    contraindications: []
    status: draft
    body: |
      Nicotine suppresses appetite, so stepping down can make you feel
      hungrier for a couple of weeks. It settles.

      Cheap insurance: keep crunchy, low-effort things within reach —
      carrot sticks, apples, sugar-free gum, sparkling water. The hand-to-
      mouth motion does double duty as a craving replacement.

  - id: vap-withdraw-007
    type: coaching_card
    title: "The morning pull (your TTFV is the dial)"
    audience: adult
    framing: [autonomy, performance]
    contraindications: []
    status: draft
    body: |
      How soon you reach for the vape after waking is the single best measure
      of how much grip nicotine has — and the single best place to loosen it.

      Today's move: push your first vape back by just 10 minutes. Brush your
      teeth, shower, make coffee first. Ten minutes is small enough to always
      win and big enough to matter — stack a few of those wins and your
      whole day's pattern shifts with it.
    slots:
      current_ttfv: user's current time-to-first-vape, plain-language

  - id: vap-withdraw-008
    type: coaching_card
    title: "What you get back, week by week"
    audience: adult
    framing: [appearance, performance, savings]
    contraindications: []
    status: draft
    body: |
      This isn't only about giving something up. Track what's arriving:

      - **Days 2–7:** taste and smell sharpen. Food gets noticeably better.
      - **Week 2:** steadier energy — no more dips between vapes. Skin starts
        looking less tired as hydration and circulation normalise.
      - **Week 3–4:** workouts and stairs feel easier; breath is fresher;
        your focus stops being hostage to the next puff.
      - **Every week:** money that used to go up in vapour stays yours —
        {{savings_to_date}} so far.

      Pick the one that matters most to you and we'll make it your milestone
      marker.
    slots:
      savings_to_date: computed from savings rail

  - id: vap-withdraw-009
    type: script
    title: "Rough-patch check-in (coach prompt copy)"
    audience: adult
    framing: [autonomy]
    contraindications: []
    status: draft
    body: |
      Sounds like today's been heavier than usual. That happens on the way
      down — it doesn't undo anything you've built.

      Want to do one of these together?
      - A 3-minute urge-surf (audio)
      - Look at what triggered today, so it surprises you less next time
      - Adjust this week's budget so it bends instead of breaking

      You're allowed to make the plan easier. Finishing a gentler plan beats
      abandoning a brutal one.
