meta:
  pack: vaping
  programme: Exhale
  module: taper-puff-budget
  status: draft
  schema: preventos.content-atom/0.1
  version: "0.1.0"
  language: en-GB
  defaults:
    vertical: vaping
    reading_age: 9
    tone: autonomy-supportive
    channels: [app, web]
    contraindications: []

atoms:
  - id: vaping.budget.how-budget-works
    type: info_card
    title: "How a puff budget works"
    body: |
      A puff budget turns "vape less" — which is vague and loseable — into a
      daily number you can actually win.

      We start from your real usage (no aspirational starting lines), then
      step the number down on a schedule you approve. You spend your budget
      however you like: save puffs for the moments that are genuinely hard,
      skip the ones that are just autopilot.

      The budget is a tool, not a judge. Going over doesn't reset anything —
      it's data that tells us where the plan needs reinforcing.
    contraindications:
      - dual_user_unrouted
    tone: autonomy-supportive
    bcttv1:
      - code: "1.1"
        label: "Goal setting (behaviour)"
    com_b:
      - reflective-motivation

  - id: vaping.budget.plan-shape
    type: plan_template
    title: "Puff-budget plan shape"
    body: |
      Filled by WPV.2 taper rules; copy strings below are the user-visible surface.
      Fields: baseline_daily_puffs (integer), step_percent (integer),
      step_interval_days (integer), floor_before_quit_day (integer),
      hard_windows (list).
    contraindications:
      - dual_user_unrouted
    tone: autonomy-supportive
    evidence_note: "Baseline measured over 3-day observation window, not self-estimated; step_percent default 10–15% per step, user-tunable; step_interval_days default 7, user-tunable; hard_windows user-nominated times where budget is pre-reserved."
    bcttv1:
      - code: "1.1"
        label: "Goal setting (behaviour)"
    com_b:
      - reflective-motivation

  - id: vaping.budget.spending-well
    type: info_card
    title: "Spending your budget well"
    body: |
      Not all puffs cost the same. Autopilot puffs (kettle's boiling, screen
      loading) give you almost nothing — you barely notice them happening.
      The hard-moment puffs are the ones doing real work.

      Strategy: spend your budget like money. Cut the autopilot puffs first —
      you won't miss them — and keep cover for your genuinely hard windows
      ({hard_windows}). Same budget, much easier day.
    slots:
      - hard_windows
    tone: practical
    bcttv1:
      - code: "1.2"
        label: "Problem solving"
    com_b:
      - psychological-capability

  - id: vaping.budget.over-budget-today
    type: info_card
    title: "Over budget today — read this, don't spiral"
    body: |
      You went over. Here's what that does to your progress: nothing, by
      itself. One over-budget day is a data point, not a verdict — the plan
      bends so it doesn't break.

      What we do with it: look at *where* the extra puffs went. A rough day
      at work? A social evening? That's the plan telling us which window
      needs reinforcement before the next step down. Days won so far:
      {days_won} — still yours, still counting.
    slots:
      - days_won
    tone: autonomy-supportive
    bcttv1:
      - code: "2.3"
        label: "Self-monitoring of behaviour"
    com_b:
      - reflective-motivation

  - id: vaping.budget.repeatedly-over
    type: info_card
    title: "Repeatedly over? The plan adjusts, not you"
    body: |
      Three over-budget days in a row means the plan is mis-sized, not that
      you're failing. The fix is mechanical: we hold this step for another
      week, or re-cut the step size. Both are normal moves — most successful
      tapers include at least one re-plan.

      What we don't do: pretend the slips didn't happen, or tear up the plan
      in disgust. The budget that gets you there is the one you can actually
      keep.
    tone: autonomy-supportive
    bcttv1:
      - code: "1.2"
        label: "Problem solving"
    com_b:
      - reflective-motivation

  - id: vaping.budget.ttfv-moving
    type: info_card
    title: "Your TTFV is moving (milestone copy)"
    body: |
      Quiet milestone worth noticing: your first vape of the day has moved
      from {ttfv_start} to {ttfv_now} after waking.

      That number is the closest thing to a dependence gauge that exists,
      and yours is heading the right way. The morning is becoming yours
      again — coffee first, world first, vape later. Eventually: not at all.
    slots:
      - ttfv_start
      - ttfv_now
    tone: autonomy-supportive
    bcttv1:
      - code: "2.2"
        label: "Feedback on behaviour"
    com_b:
      - reflective-motivation

  - id: vaping.budget.approaching-floor
    type: info_card
    title: "Approaching the floor: choosing your quit day"
    body: |
      You're down to {today_budget} puffs a day — from {baseline_daily_puffs}.
      At this level, the last step is smaller than any step you've already
      taken. You've done the hard part; this is the victory lap.

      Pick a quit day in the next two weeks. You'll keep every tool — the
      menus, the rescue button, the debriefs all stay. The only thing that
      changes is the budget reads zero, the counter reads "days won", and
      the {weekly_spend} a week stops leaving your account for good.
    slots:
      - today_budget
      - baseline_daily_puffs
      - weekly_spend
    tone: autonomy-supportive
    bcttv1:
      - code: "1.1"
        label: "Goal setting (behaviour)"
    com_b:
      - reflective-motivation
