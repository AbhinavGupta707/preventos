services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: preventos
      POSTGRES_PASSWORD: preventos_dev
      POSTGRES_DB: preventos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U preventos"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
