<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sprout — PreventOS companion (motion reference)</title>
<style>
  :root {
    --bg: #f4f7f3; --ink: #25352b; --muted: #6b7d70;
    --body: #7fce9e; --body-dk: #5bb582; --belly: #eafaf0;
    --leaf: #62c07a; --cheek: #f7b6a6; --eye: #2b3d31;
    --ring: #9fd9b8; --accent: #2f9e6a;
    --dur-blink: 5s;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; background: var(--bg); color: var(--ink);
    font-family: ui-rounded, "SF Pro Rounded", system-ui, sans-serif;
    display: flex; flex-direction: column; align-items: center; gap: 18px;
    padding: 28px 16px 40px;
  }
  h1 { font-size: 18px; font-weight: 600; margin: 0; letter-spacing: .2px; }
  .sub { font-size: 13px; color: var(--muted); margin: -10px 0 0; }
  .stage {
    width: 280px; height: 300px; display: grid; place-items: center;
    background: radial-gradient(120px 120px at 50% 42%, #ffffff 0%, var(--bg) 70%);
    border-radius: 28px; position: relative; overflow: hidden;
  }
  .speech {
    min-height: 20px; font-size: 14px; color: var(--accent); font-weight: 600;
    text-align: center; max-width: 300px; transition: opacity .3s;
  }
  .slot { font-size: 11px; color: var(--muted); font-family: ui-monospace, monospace; }
  .controls { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 340px; }
  button {
    font: inherit; font-size: 13px; font-weight: 600; padding: 8px 14px; cursor: pointer;
    border: 1.5px solid var(--body-dk); border-radius: 999px; background: #fff; color: var(--body-dk);
    transition: transform .1s, background .15s;
  }
  button:hover { background: #eef9f1; }
  button[aria-pressed="true"] { background: var(--body-dk); color: #fff; }
  button:active { transform: scale(.96); }
  .grow { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--muted); }
  .grow input { width: 150px; }
  .breath-label {
    position: absolute; bottom: 16px; font-size: 13px; font-weight: 600; color: var(--accent);
    opacity: 0; transition: opacity .4s;
  }
  .stage[data-mood="breathing"] .breath-label { opacity: 1; }

  /* ---- the creature ---- */
  #sprout { transform-origin: 50% 86%; }
  .bob   { animation: bob 6s ease-in-out infinite; transform-origin: 50% 86%; }
  @keyframes bob { 0%,100% { transform: translateY(0) rotate(0deg);} 50% { transform: translateY(-7px) rotate(-1.5deg);} }

  /* eyes blink (default) */
  .lid { transform-origin: center; transform: scaleY(0); animation: blink var(--dur-blink) infinite; }
  @keyframes blink { 0%,94%,100%{transform:scaleY(0);} 97%{transform:scaleY(1);} }

  .cheek { opacity: .0; transition: opacity .4s; }
  .sparkle { opacity: 0; }
  .zzz { opacity: 0; }

  /* HAPPY */
  [data-mood="happy"] #sprout { animation: hop 1.6s ease-in-out infinite; }
  @keyframes hop { 0%,100%{transform:translateY(0);} 30%{transform:translateY(-16px);} 45%{transform:translateY(-12px);} }
  [data-mood="happy"] .cheek { opacity: .85; }
  [data-mood="happy"] .sparkle { animation: twinkle 1.6s ease-in-out infinite; }
  @keyframes twinkle { 0%,100%{opacity:0; transform:scale(.6);} 50%{opacity:1; transform:scale(1);} }

  /* CELEBRATING */
  [data-mood="celebrating"] #sprout { animation: jump 1s ease-in-out infinite; }
  @keyframes jump { 0%,100%{transform:translateY(0) scale(1);} 25%{transform:translateY(-26px) scale(1.05);} 55%{transform:translateY(-4px) scale(.97);} }
  [data-mood="celebrating"] .cheek { opacity: .9; }
  [data-mood="celebrating"] .confetti i { animation: fall 1.1s linear infinite; }
  .confetti { opacity: 0; }
  [data-mood="celebrating"] .confetti { opacity: 1; }
  .confetti i { position: absolute; top: 30px; width: 8px; height: 8px; border-radius: 2px; opacity: 0; }
  .confetti i:nth-child(1){ left: 34%; background:#f7b6a6; animation-delay:0s; }
  .confetti i:nth-child(2){ left: 50%; background:#7fce9e; animation-delay:.2s; }
  .confetti i:nth-child(3){ left: 64%; background:#f4cf6b; animation-delay:.4s; }
  .confetti i:nth-child(4){ left: 44%; background:#9bb8f0; animation-delay:.6s; }
  @keyframes fall { 0%{opacity:1; transform:translateY(0) rotate(0);} 100%{opacity:0; transform:translateY(150px) rotate(220deg);} }

  /* CONCERNED — caring lean, never sad/crying */
  [data-mood="concerned"] #sprout { animation: lean 5s ease-in-out infinite; }
  @keyframes lean { 0%,100%{transform:rotate(0) translateY(0);} 50%{transform:rotate(4deg) translateY(2px);} }

  /* BREATHING — co-regulation: 4s inhale, 6s exhale */
  [data-mood="breathing"] #sprout { animation: breathe 10s ease-in-out infinite; }
  @keyframes breathe { 0%{transform:scale(.84);} 40%{transform:scale(1.12);} 100%{transform:scale(.84);} }
  .guide { opacity: 0; transform-origin: 50% 50%; }
  [data-mood="breathing"] .guide { opacity: .55; animation: guidepulse 10s ease-in-out infinite; }
  @keyframes guidepulse { 0%{transform:scale(.7); opacity:.3;} 40%{transform:scale(1.25); opacity:.65;} 100%{transform:scale(.7); opacity:.3;} }

  /* ASLEEP */
  [data-mood="asleep"] #sprout { animation: snooze 8s ease-in-out infinite; }
  @keyframes snooze { 0%,100%{transform:translateY(0) rotate(-3deg);} 50%{transform:translateY(4px) rotate(-3deg);} }
  [data-mood="asleep"] .lid { animation: none; transform: scaleY(1); }
  [data-mood="asleep"] .zzz { animation: floatz 3.5s ease-in-out infinite; }
  @keyframes floatz { 0%{opacity:0; transform:translateY(0);} 30%{opacity:1;} 100%{opacity:0; transform:translateY(-28px);} }

  /* STEPPED ASIDE — crisis: companion is gone, the real crisis card shows */
  [data-mood="stepped_aside"] #sprout, [data-mood="stepped_aside"] .guide { display: none; }
  .crisis-card { display: none; width: 230px; padding: 16px; border-radius: 16px;
    background: #1f2438; color: #eef0fb; text-align: left; }
  [data-mood="stepped_aside"] .crisis-card { display: block; }
  .crisis-card b { display: block; font-size: 14px; margin-bottom: 6px; }
  .crisis-card span { display: block; font-size: 12px; color: #b9c0e0; line-height: 1.5; }

  @media (prefers-reduced-motion: reduce) {
    #sprout, .lid, .cheek, .sparkle, .confetti i, .guide, .zzz { animation: none !important; }
  }
</style>
</head>
<body>
  <h1>Meet Sprout</h1>
  <p class="sub">Your companion — the friendly face of one guarded coach.</p>

  <div class="stage" id="stage" data-mood="idle">
    <svg class="guide" width="220" height="220" viewBox="0 0 220 220" aria-hidden="true" style="position:absolute">
      <circle cx="110" cy="110" r="86" fill="none" stroke="var(--ring)" stroke-width="3" stroke-dasharray="6 10" />
    </svg>
    <div class="confetti" aria-hidden="true"><i></i><i></i><i></i><i></i></div>

    <svg id="sprout" width="180" height="200" viewBox="0 0 180 200" role="img" aria-label="Sprout the companion">
      <!-- sprout leaves (grow with evolution stage) -->
      <g id="leaves">
        <path id="stem" d="M90 64 V40" stroke="#4ea876" stroke-width="5" stroke-linecap="round" fill="none"/>
        <path id="leafL" d="M90 48 q-22 -6 -30 -24 q22 -2 30 16 Z" fill="var(--leaf)"/>
        <path id="leafR" d="M90 44 q20 -10 30 -6 q-6 20 -30 14 Z" fill="var(--body-dk)"/>
      </g>
      <!-- body -->
      <path d="M90 60 C140 60 156 104 156 134 C156 176 126 192 90 192 C54 192 24 176 24 134 C24 104 40 60 90 60 Z" fill="var(--body)"/>
      <ellipse cx="90" cy="150" rx="44" ry="36" fill="var(--belly)"/>
      <!-- cheeks -->
      <circle class="cheek" cx="58" cy="140" r="9" fill="var(--cheek)"/>
      <circle class="cheek" cx="122" cy="140" r="9" fill="var(--cheek)"/>
      <!-- eyes -->
      <g id="eyes">
        <circle cx="74" cy="124" r="7.5" fill="var(--eye)"/>
        <circle cx="106" cy="124" r="7.5" fill="var(--eye)"/>
        <circle cx="76" cy="121" r="2.4" fill="#fff"/>
        <circle cx="108" cy="121" r="2.4" fill="#fff"/>
        <!-- eyelids for blink -->
        <rect class="lid" x="65" y="115" width="18" height="18" rx="9" fill="var(--body)"/>
        <rect class="lid" x="97" y="115" width="18" height="18" rx="9" fill="var(--body)"/>
      </g>
      <!-- mouth (swapped per mood by JS) -->
      <path id="mouth" d="M80 150 q10 10 20 0" stroke="var(--eye)" stroke-width="3" fill="none" stroke-linecap="round"/>
      <!-- sparkles -->
      <g class="sparkle">
        <path d="M150 96 l3 7 l7 3 l-7 3 l-3 7 l-3 -7 l-7 -3 l7 -3 Z" fill="#f4cf6b"/>
      </g>
      <!-- zzz for sleep -->
      <g class="zzz" fill="var(--muted)" font-family="inherit" font-weight="700">
        <text x="128" y="96" font-size="14">z</text>
        <text x="140" y="84" font-size="18">Z</text>
      </g>
    </svg>

    <div class="crisis-card" role="note">
      <b>You deserve support right now</b>
      <span>Samaritans — call 116 123, free, 24/7</span>
      <span>Shout — text SHOUT to 85258</span>
      <span>Emergency — call 999</span>
    </div>

    <div class="breath-label" id="breathLabel">Breathe in…</div>
  </div>

  <div class="speech" id="speech">Hello — I'm so glad you're here.</div>
  <div class="slot" id="slot">slot: companion.onboarding.greet</div>

  <div class="controls" id="controls"></div>

  <div class="grow">
    <label for="days">Days won</label>
    <input type="range" id="days" min="0" max="120" value="5" />
    <span id="daysOut">5 · fledgling</span>
  </div>

<script>
  // Mirrors @preventos/companion: mood -> dialogue slot + demo copy + mouth.
  const MOODS = {
    idle:          { slot: "companion.home.idle",            copy: "Just here with you.",                 mouth: "M80 150 q10 8 20 0" },
    happy:         { slot: "companion.home.encourage",       copy: "Nice — that's another good move.",    mouth: "M78 148 q12 14 24 0" },
    celebrating:   { slot: "companion.milestone.celebrate",  copy: "Look at you go! A real milestone.",   mouth: "M76 146 q14 18 28 0" },
    concerned:     { slot: "companion.lapse.care",           copy: "A slip is a moment, not the end.",    mouth: "M80 152 q10 4 20 0" },
    breathing:     { slot: "companion.sos.coregulate",       copy: "Let's ride this out together.",       mouth: "M82 150 q8 6 16 0" },
    asleep:        { slot: null,                             copy: "(resting — quiet hours)",             mouth: "M82 151 q8 3 16 0" },
    stepped_aside: { slot: null,                             copy: "(companion steps aside in a crisis)", mouth: "M80 150 q10 8 20 0" },
  };
  const EVOLUTION = [[0,"sprout"],[1,"hatchling"],[3,"fledgling"],[7,"explorer"],[14,"thriving"],[28,"flourishing"],[90,"luminous"]];
  const stage = d => EVOLUTION.reduce((acc,[min,name]) => d>=min ? name : acc, "sprout");

  const stageEl = document.getElementById("stage");
  const speech = document.getElementById("speech");
  const slot = document.getElementById("slot");
  const mouth = document.getElementById("mouth");
  const controls = document.getElementById("controls");

  function setMood(m) {
    stageEl.dataset.mood = m;
    const def = MOODS[m];
    speech.textContent = def.copy;
    slot.textContent = def.slot ? "slot: " + def.slot : "slot: — (silent)";
    mouth.setAttribute("d", def.mouth);
    [...controls.children].forEach(b => b.setAttribute("aria-pressed", String(b.dataset.m === m)));
  }
  Object.keys(MOODS).forEach(m => {
    const b = document.createElement("button");
    b.textContent = m.replace("_"," "); b.dataset.m = m;
    b.onclick = () => setMood(m);
    controls.appendChild(b);
  });

  // breathing label timed to the 4s-in / 6s-out cycle
  setInterval(() => {
    if (stageEl.dataset.mood !== "breathing") return;
    const t = (Date.now() % 10000);
    document.getElementById("breathLabel").textContent = t < 4000 ? "Breathe in…" : "Breathe out…";
  }, 250);

  // days-won grows the sprout (evolution) — deterministic, no random rewards
  const days = document.getElementById("days"), daysOut = document.getElementById("daysOut");
  function grow() {
    const d = +days.value, s = stage(d);
    daysOut.textContent = d + " · " + s;
    const scale = Math.min(1.6, 0.5 + d/60);
    document.getElementById("leaves").setAttribute("transform", `translate(90 52) scale(${scale.toFixed(2)}) translate(-90 -52)`);
  }
  days.oninput = grow; grow();
  setMood("idle");
</script>
</body>
</html>
